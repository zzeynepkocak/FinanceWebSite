<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinansTerminal — Canlı Trading</title>
  <link rel="stylesheet" href="style.css" />
  <!-- lightweight-charts v4 (MIT) -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- ═══════════════ TOP BAR ═══════════════ -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">&#9670; FinansTerminal</span>
      <div class="search-wrap">
        <input id="symbolInput" class="search-input" type="text" placeholder="Sembol ara... BTC, ETH, BNB" autocomplete="off" />
        <ul id="searchDropdown" class="search-dropdown hidden"></ul>
      </div>
    </div>

    <div class="topbar-center">
      <div class="active-symbol-info">
        <span id="activeSymbolLabel" class="symbol-name">BTCUSDT</span>
        <span id="activePrice" class="active-price">—</span>
        <span id="activeChange" class="active-change">—</span>
        <span id="activeHigh" class="stat-item"><span class="stat-lbl">Y:</span> <span id="highVal">—</span></span>
        <span id="activeLow"  class="stat-item"><span class="stat-lbl">D:</span> <span id="lowVal">—</span></span>
        <span id="activeVol"  class="stat-item"><span class="stat-lbl">H:</span> <span id="volVal">—</span></span>
      </div>
    </div>

    <div class="topbar-right">
      <nav class="topnav">
        <a class="nav-link active" href="#">Grafik</a>
        <a class="nav-link" href="#">Haberler</a>
        <a class="nav-link" href="#">Portföy</a>
      </nav>
      <div class="connection-indicator">
        <span id="wsStatus" class="ws-dot disconnected"></span>
        <span id="wsLabel" class="ws-label">Bağlanıyor...</span>
      </div>
    </div>
  </header>

  <!-- ═══════════════ MAIN LAYOUT ═══════════════ -->
  <div class="main-layout">

    <!-- LEFT — watchlist -->
    <aside class="sidebar-left">
      <div class="sidebar-header">
        <span class="sidebar-title">İzleme Listesi</span>
      </div>
      <ul id="watchlist" class="watchlist">
        <!-- populated by JS -->
      </ul>
    </aside>

    <!-- CENTER — chart -->
    <section class="chart-section">
      <!-- chart toolbar -->
      <div class="chart-toolbar">
        <div class="toolbar-group period-group">
          <button class="period-btn" data-interval="1m">1D</button>
          <button class="period-btn" data-interval="5m">5D</button>
          <button class="period-btn active" data-interval="15m">15D</button>
          <button class="period-btn" data-interval="1h">1S</button>
          <button class="period-btn" data-interval="4h">4S</button>
          <button class="period-btn" data-interval="1d">1G</button>
          <button class="period-btn" data-interval="1w">1H</button>
        </div>

        <div class="toolbar-group type-group">
          <button class="type-btn active" data-type="candlestick" title="Mum">&#9646;</button>
          <button class="type-btn" data-type="line"        title="Çizgi">&#8725;</button>
          <button class="type-btn" data-type="area"        title="Alan">&#9651;</button>
          <button class="type-btn" data-type="bar"         title="Bar">&#9141;</button>
        </div>

        <div class="toolbar-group indicator-group">
          <button class="ind-btn active" data-ind="ma" title="Hareketli Ortalamalar">MA</button>
          <button class="ind-btn active" data-ind="bb"  title="Bollinger Bands">BB</button>
          <button class="ind-btn"        data-ind="vol" title="Hacim">VOL</button>
        </div>
      </div>

      <!-- chart canvas -->
      <div id="chartContainer" class="chart-container">
        <div id="loadingOverlay" class="loading-overlay">
          <div class="spinner"></div>
          <span>Veri yükleniyor...</span>
        </div>
        <div id="crosshairInfo" class="crosshair-info hidden">
          <span id="ciTime"></span>
          <span id="ciOpen">A:<b></b></span>
          <span id="ciHigh">Y:<b></b></span>
          <span id="ciLow">D:<b></b></span>
          <span id="ciClose">K:<b></b></span>
          <span id="ciVol">H:<b></b></span>
        </div>
      </div>
    </section>

    <!-- RIGHT — order book -->
    <aside class="sidebar-right">
      <div class="sidebar-header">
        <span class="sidebar-title">Emir Defteri</span>
        <span class="spread-label">Spread: <b id="spreadVal">—</b></span>
      </div>

      <div class="orderbook">
        <div class="ob-head">
          <span>Fiyat (USDT)</span>
          <span>Miktar</span>
          <span>Toplam</span>
        </div>

        <div class="ob-asks-wrap">
          <ul id="obAsks" class="ob-list ob-asks"></ul>
        </div>

        <div class="ob-mid-price">
          <span id="obMidPrice">—</span>
          <span id="obMidArrow" class="mid-arrow">&#9650;</span>
        </div>

        <div class="ob-bids-wrap">
          <ul id="obBids" class="ob-list ob-bids"></ul>
        </div>
      </div>

      <div class="trade-form">
        <div class="trade-tabs">
          <button class="trade-tab active" data-side="buy">Al</button>
          <button class="trade-tab"        data-side="sell">Sat</button>
        </div>
        <label class="form-label">Fiyat (USDT)
          <input id="tradePrice" class="form-input" type="number" placeholder="Piyasa" />
        </label>
        <label class="form-label">Miktar
          <input id="tradeQty" class="form-input" type="number" placeholder="0.001" step="0.001" />
        </label>
        <button id="tradeBtn" class="trade-submit buy">Al / Long</button>
        <p class="trade-note">* Demo mod — gerçek emir gönderilmez</p>
      </div>
    </aside>
  </div>

  <!-- ═══════════════ BOTTOM TICKER ═══════════════ -->
  <footer class="ticker-bar">
    <div class="ticker-track" id="tickerTrack">
      <!-- populated by JS -->
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
