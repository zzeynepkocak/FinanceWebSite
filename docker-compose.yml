# FinansPortalı — Docker Compose
# Toyota & 32Bit 2026
#
# Hızlı başlangıç:
#   docker compose up --build
#
# Sıralı başlangıç (production benzeri):
#   1. docker compose up -d postgres
#   2. docker compose up -d keycloak          # ~90sn bekle
#   3. docker compose up -d zookeeper kafka
#   4. docker compose up -d opensearch
#   5. docker compose up -d otel-collector
#   6. docker compose up -d prometheus
#   7. docker compose up -d backend
#   8. docker compose up -d frontend
#
# Erişim adresleri:
#   Frontend            → http://localhost:3000
#   Backend API         → http://localhost:8081
#   Swagger UI          → http://localhost:8081/swagger-ui.html
#   Keycloak Admin      → http://localhost:8080  (admin/admin)
#   Prometheus          → http://localhost:9090
#   OpenSearch          → http://localhost:9200
#   OpenSearch Dashboards→ http://localhost:5601

services:

  # ── PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finans-postgres
    environment:
      POSTGRES_DB: finansdb
      POSTGRES_USER: finans
      POSTGRES_PASSWORD: finans123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finans -d finansdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finans-net

  # ── Keycloak ─────────────────────────────────────
  # Admin: http://localhost:8080  →  admin / admin
  # Realm: toyota-finance
  # Client: finance-portal-app
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: finans-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/finansdb
      KC_DB_USERNAME: finans
      KC_DB_PASSWORD: finans123
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-toyota-finance.json:/opt/keycloak/data/import/realm-toyota-finance.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 15s
      timeout: 10s
      retries: 1
      start_period: 5s
    networks:
      - finans-net

  # ── Zookeeper ─────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: finans-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - finans-net

  # ── Kafka ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finans-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - finans-net

  # ── OpenSearch (log depolama) ─────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: finans-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s
    networks:
      - finans-net

  # ── OpenSearch Dashboards (Kibana muadili) ────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: finans-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - finans-net

  # ── OpenTelemetry Collector ───────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: finans-otel-collector
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8889:8889"   # Prometheus exporter
    networks:
      - finans-net

  # ── Prometheus ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: finans-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - finans-net

  # ── Spring Boot Backend ───────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finans-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finansdb
      SPRING_DATASOURCE_USERNAME: finans
      SPRING_DATASOURCE_PASSWORD: finans123
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/toyota-finance
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENSEARCH_URL: http://opensearch:9200
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SDK_DISABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE: ""
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-d72j16pr01qlfd9neho0d72j16pr01qlfd9nehog}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - finans-net

  # ── React Frontend (production build) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finans-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - finans-net

volumes:
  postgres_data:
  opensearch_data:
  prometheus_data:

networks:
  finans-net:
    driver: bridge
