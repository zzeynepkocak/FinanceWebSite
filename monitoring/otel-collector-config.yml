# OpenTelemetry Collector Yapılandırması
# Finance Portal — Traces, Metrics, Logs toplayıcı

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    limit_mib: 256
    spike_limit_mib: 64
    check_interval: 5s

exporters:
  # Prometheus exporter (Grafana çeker)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "finance_portal"

  # OpenSearch log exporter
  opensearch:
    http:
      endpoint: http://opensearch:9200
      tls:
        insecure: true
    logs_index: "finance-portal-logs"
    traces_index: "finance-portal-traces"

  # Debug (container loglarına)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [opensearch, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [opensearch, debug]
