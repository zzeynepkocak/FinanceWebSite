spring:
  application:
    name: finance-portal

  profiles:
    active: local

---
# ═══════════════════════════════════════
#  LOCAL profile — H2, security disabled
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:finansdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      missing-topics-fatal: false

  # Caffeine cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: 8081

finnhub:
  api:
    key: ${FINNHUB_API_KEY:d72j16pr01qlfd9neho0d72j16pr01qlfd9nehog}
    base-url: https://finnhub.io/api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: always

# OpenAPI / Swagger (Req #18)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

opensearch:
  url: ${OPENSEARCH_URL:http://localhost:9200}
  index: finance-portal-logs

logging:
  config: classpath:log4j2.xml
  level:
    com.toyota.finance: DEBUG
    org.springframework.security: INFO

---
# ═══════════════════════════════════════
#  DOCKER profile — PostgreSQL + Keycloak
# ═══════════════════════════════════════
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/finansdb}
    username: ${SPRING_DATASOURCE_USERNAME:finans}
    password: ${SPRING_DATASOURCE_PASSWORD:finans123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/toyota-finance}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: finance-portal
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # Caffeine cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=600s

server:
  port: 8081

finnhub:
  api:
    key: ${FINNHUB_API_KEY:d72j16pr01qlfd9neho0d72j16pr01qlfd9nehog}
    base-url: https://finnhub.io/api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

# OpenTelemetry (Req #9)
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}
  resource:
    attributes:
      service.name: finance-portal
      service.version: 1.0.0
  metrics:
    exporter: otlp
  traces:
    exporter: otlp
  logs:
    exporter: otlp

# OpenAPI / Swagger (Req #18)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

opensearch:
  url: ${OPENSEARCH_URL:http://opensearch:9200}
  index: finance-portal-logs

logging:
  config: classpath:log4j2.xml
  level:
    com.toyota.finance: INFO
    org.springframework.security: WARN
