spring.application.name=finance-portal


# PostgreSQL Bağlantısı
spring.datasource.url=jdbc:postgresql://localhost:5432/toyota_finance
spring.datasource.username=admin
spring.datasource.password=password123

# Tabloları otomatik oluşturması için
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Keycloak OAuth2 Resource Server (JWT doğrulama)
# Docker'daki Keycloak realm URL'i - realm adı: toyota-finance
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/toyota-finance